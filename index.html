<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moliya va Aviabilet Nazorati (Multi-Valyuta)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --info: #2980b9;
            --warning: #f39c12;
            --light: #f8f9fa;
            --dark: #34495e;
            --gray: #95a5a6;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f7; padding: 10px; color: #333; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }

        /* Inputlar paneli */
        .inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            background: var(--light);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }

        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
        
        /* Aviabilet detallari */
        #flight-details {
            grid-column: 1 / -1;
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: #e1f5fe;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed var(--info);
        }

        .btn-add { background: var(--success); color: white; border: none; cursor: pointer; font-weight: bold; height: 45px; margin-top: auto; }
        .btn-update { background: var(--warning); color: white; border: none; cursor: pointer; font-weight: bold; height: 45px; margin-top: auto; display: none; }
        .btn-cancel { background: var(--gray); color: white; border: none; cursor: pointer; font-weight: bold; height: 45px; margin-top: auto; display: none; }

        /* Statistika Paneli */
        .summary-boxes {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px; margin-bottom: 20px;
        }
        .box { padding: 15px; border-radius: 12px; color: white; }
        .box h3 { margin: 0 0 10px 0; font-size: 13px; opacity: 0.9; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
        .currency-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-top: 5px; }
        
        .box-income { background: #27ae60; }
        .box-expense { background: #e74c3c; }
        .box-balance { background: #2c3e50; }

        /* Qidiruv */
        .search-container { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .search-input { flex: 1; border: none; font-size: 16px; outline: none; }

        /* Guruhlangan Sana */
        .date-section { margin-top: 20px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; background: white; }
        .date-header { 
            background: #f1f5f9; padding: 10px 15px; font-weight: bold; color: var(--primary);
            display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0;
        }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 10px 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #f8fafc; color: #64748b; font-weight: 600; }

        .status-badge { padding: 4px 8px; border-radius: 15px; font-size: 11px; cursor: pointer; border: none; font-weight: bold; }
        .status-paid { background: #dcfce7; color: #166534; }
        .status-unpaid { background: #fee2e2; color: #991b1b; }

        .action-btns { display: flex; gap: 5px; }
        .edit-btn { background: #fef9c3; color: #854d0e; border: none; padding: 5px 8px; border-radius: 5px; cursor: pointer; }
        .delete-btn { background: #fee2e2; color: #991b1b; border: none; padding: 5px 8px; border-radius: 5px; cursor: pointer; }

        .btn-bar { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-excel { background: var(--info); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="formTitle">Moliya va Aviabilet Nazorati</h2>

    <!-- 1. Form qismi -->
    <div class="inputs">
        <div class="input-group"><label>Sana</label><input type="date" id="customDate"></div>
        <div class="input-group"><label>Ism sharif</label><input type="text" id="name" placeholder="Masalan: Ali Valiyev"></div>
        
        <div class="input-group">
            <label>Summa</label>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="amount" placeholder="0" oninput="formatInput(this)" style="flex: 2;">
                <select id="currency" style="flex: 1;">
                    <option value="UZS">UZS</option>
                    <option value="USD">USD</option>
                    <option value="RUB">RUB</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Bo'lim</label>
            <select id="category" onchange="toggleFlightFields()">
                <option value="Aviabilet">Aviabilet</option>
                <option value="Qarz">Qarzlar</option>
                <option value="Xizmatlar">Xizmatlar</option>
                <option value="Boshqa">Boshqa</option>
            </select>
        </div>

        <div id="flight-details">
            <div class="input-group"><label>Yo'nalish</label><input type="text" id="route" placeholder="Toshkent - Moskva"></div>
            <div class="input-group"><label>Bilet №</label><input type="text" id="ticketNum" placeholder="235-0000000"></div>
        </div>

        <div class="input-group"><label>Izoh</label><input type="text" id="desc" placeholder="..."></div>
        
        <div class="input-group">
            <label>Turi</label>
            <select id="type">
                <option value="income">Pul oldim (+)</option>
                <option value="expense">Xarajat / Berdim (-)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Holati</label>
            <select id="initialStatus">
                <option value="paid">To'lov qildi</option>
                <option value="unpaid">Qarz (to'lamadi)</option>
            </select>
        </div>

        <button class="btn-add" id="btnAdd" onclick="addItem()">Qo'shish</button>
        <button class="btn-update" id="btnUpdate" onclick="saveEdit()">Saqlash</button>
        <button class="btn-cancel" id="btnCancel" onclick="cancelEdit()">Bekor</button>
    </div>

    <!-- 2. Statistika qismi -->
    <div class="summary-boxes">
        <div class="box box-income">
            <h3>JAMI KIRIM</h3>
            <div class="currency-row"><span>UZS:</span> <span id="incUZS">0</span></div>
            <div class="currency-row"><span>USD:</span> <span id="incUSD">0</span></div>
            <div class="currency-row"><span>RUB:</span> <span id="incRUB">0</span></div>
        </div>
        <div class="box box-expense">
            <h3>JAMI CHIQIM</h3>
            <div class="currency-row"><span>UZS:</span> <span id="expUZS">0</span></div>
            <div class="currency-row"><span>USD:</span> <span id="expUSD">0</span></div>
            <div class="currency-row"><span>RUB:</span> <span id="expRUB">0</span></div>
        </div>
        <div class="box box-balance">
            <h3>BALANS</h3>
            <div class="currency-row"><span>UZS:</span> <span id="balUZS">0</span></div>
            <div class="currency-row"><span>USD:</span> <span id="balUSD">0</span></div>
            <div class="currency-row"><span>RUB:</span> <span id="balRUB">0</span></div>
        </div>
    </div>

    <!-- 3. Amallar va Qidiruv -->
    <div class="search-container">
        🔍 <input type="text" id="searchInput" class="search-input" placeholder="Ism, bilet №, summa yoki yo'nalish bo'yicha qidirish..." oninput="updateUI()">
    </div>

    <div class="btn-bar">
        <button class="btn-excel" onclick="exportToExcel()">📥 Excelga yuklash</button>
        <button class="btn-excel" style="background:var(--danger)" onclick="deleteSelected()">🗑️ Tanlanganlarni o'chirish</button>
        <button class="btn-excel" style="background:var(--dark)" onclick="clearAllData()">⚠️ Hammasini tozalash</button>
    </div>

    <!-- 4. Jadval (Sana bo'yicha bo'limlar) -->
    <div id="tableDisplay"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('megaFinData')) || [];
    let editId = null;

    window.onload = () => { 
        document.getElementById('customDate').value = new Date().toISOString().split('T')[0];
        toggleFlightFields();
        updateUI(); 
    };

    function formatNumber(num) { 
        return num.toLocaleString('ru-RU'); 
    }

    function formatInput(input) {
        let value = input.value.replace(/\D/g, "");
        if (value) input.value = Number(value).toLocaleString('ru-RU');
    }

    function toggleFlightFields() {
        const cat = document.getElementById('category').value;
        document.getElementById('flight-details').style.display = (cat === 'Aviabilet') ? 'grid' : 'none';
    }

    function addItem() {
        const date = document.getElementById('customDate').value;
        const name = document.getElementById('name').value;
        const amountStr = document.getElementById('amount').value.replace(/\s/g, "");
        
        if(!date || !name || !amountStr) return alert("Sana, ism va summani kiriting!");

        const newItem = {
            id: Date.now(),
            date, name,
            amount: parseFloat(amountStr),
            currency: document.getElementById('currency').value,
            category: document.getElementById('category').value,
            route: document.getElementById('route').value,
            ticketNum: document.getElementById('ticketNum').value,
            desc: document.getElementById('desc').value,
            type: document.getElementById('type').value,
            status: document.getElementById('initialStatus').value
        };

        data.push(newItem);
        clearInputs();
        updateUI();
    }

    function startEdit(id) {
        editId = id;
        const item = data.find(i => i.id === id);
        document.getElementById('customDate').value = item.date;
        document.getElementById('name').value = item.name;
        document.getElementById('amount').value = formatNumber(item.amount);
        document.getElementById('currency').value = item.currency;
        document.getElementById('category').value = item.category;
        document.getElementById('route').value = item.route;
        document.getElementById('ticketNum').value = item.ticketNum;
        document.getElementById('desc').value = item.desc;
        document.getElementById('type').value = item.type;
        document.getElementById('initialStatus').value = item.status;
        
        toggleFlightFields();
        document.getElementById('btnAdd').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'block';
        document.getElementById('btnCancel').style.display = 'block';
        document.getElementById('formTitle').innerText = "Tahrirlash...";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function saveEdit() {
        const idx = data.findIndex(i => i.id === editId);
        if(idx !== -1) {
            data[idx].date = document.getElementById('customDate').value;
            data[idx].name = document.getElementById('name').value;
            data[idx].amount = parseFloat(document.getElementById('amount').value.replace(/\s/g, ""));
            data[idx].currency = document.getElementById('currency').value;
            data[idx].category = document.getElementById('category').value;
            data[idx].route = document.getElementById('route').value;
            data[idx].ticketNum = document.getElementById('ticketNum').value;
            data[idx].desc = document.getElementById('desc').value;
            data[idx].type = document.getElementById('type').value;
            data[idx].status = document.getElementById('initialStatus').value;
            cancelEdit();
            updateUI();
        }
    }

    function cancelEdit() {
        editId = null; clearInputs();
        document.getElementById('btnAdd').style.display = 'block';
        document.getElementById('btnUpdate').style.display = 'none';
        document.getElementById('btnCancel').style.display = 'none';
        document.getElementById('formTitle').innerText = "Moliya va Aviabilet Nazorati";
    }

    function clearInputs() {
        document.getElementById('name').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('route').value = '';
        document.getElementById('ticketNum').value = '';
        document.getElementById('desc').value = '';
    }

    function updateUI() {
        localStorage.setItem('megaFinData', JSON.stringify(data));
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const display = document.getElementById('tableDisplay');
        display.innerHTML = '';

        let totals = { 
            inc: { UZS:0, USD:0, RUB:0 }, 
            exp: { UZS:0, USD:0, RUB:0 } 
        };

        // Filtrlash
        let filtered = data.filter(item => 
            item.name.toLowerCase().includes(searchTerm) || 
            item.ticketNum.toLowerCase().includes(searchTerm) || 
            item.route.toLowerCase().includes(searchTerm) ||
            item.amount.toString().includes(searchTerm)
        );

        // Statistika hisoblash
        data.forEach(item => {
            if(item.type === 'income') totals.inc[item.currency] += item.amount;
            else totals.exp[item.currency] += item.amount;
        });

        // UI Statistika yangilash
        ['UZS', 'USD', 'RUB'].forEach(c => {
            document.getElementById(`inc${c}`).innerText = formatNumber(totals.inc[c]) + ' ' + c;
            document.getElementById(`exp${c}`).innerText = formatNumber(totals.exp[c]) + ' ' + c;
            document.getElementById(`bal${c}`).innerText = formatNumber(totals.inc[c] - totals.exp[c]) + ' ' + c;
        });

        // Sana bo'yicha guruhlash
        const grouped = filtered.reduce((groups, item) => {
            if (!groups[item.date]) groups[item.date] = [];
            groups[item.date].push(item);
            return groups;
        }, {});

        const sortedDates = Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a));

        sortedDates.forEach(date => {
            const section = document.createElement('div');
            section.className = 'date-section';
            section.innerHTML = `
                <div class="date-header">
                    <span>📅 ${date}</span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th width="30"><input type="checkbox" onclick="selectAllInDate('${date}', this)"></th>
                                <th>Ism</th>
                                <th>Bo'lim / Tafsilot</th>
                                <th>Summa</th>
                                <th>Holat</th>
                                <th>Izoh</th>
                                <th>Amallar</th>
                            </tr>
                        </thead>
                        <tbody id="body-${date}">
                            ${grouped[date].map(item => `
                                <tr>
                                    <td><input type="checkbox" class="select-check" data-id="${item.id}"></td>
                                    <td><strong>${item.name}</strong></td>
                                    <td>
                                        <span style="color:var(--info); font-weight:bold;">${item.category}</span>
                                        ${item.category === 'Aviabilet' ? `<br><small>📍 ${item.route} <br> 🎫 ${item.ticketNum}</small>` : ''}
                                    </td>
                                    <td style="color:${item.type==='income'?'green':'red'}; font-weight:bold;">
                                        ${item.type==='income'?'+':'-'}${formatNumber(item.amount)} ${item.currency}
                                    </td>
                                    <td>
                                        <button class="status-badge ${item.status==='paid'?'status-paid':'status-unpaid'}" onclick="toggleStatus(${item.id})">
                                            ${item.status==='paid'?'✅ To\'landi':'❌ Qarz'}
                                        </button>
                                    </td>
                                    <td><small>${item.desc || '-'}</small></td>
                                    <td class="action-btns">
                                        <button class="edit-btn" onclick="startEdit(${item.id})">✏️</button>
                                        <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            display.appendChild(section);
        });
    }

    function toggleStatus(id) {
        const idx = data.findIndex(i => i.id === id);
        data[idx].status = data[idx].status === 'paid' ? 'unpaid' : 'paid';
        updateUI();
    }

    function deleteItem(id) {
        if(confirm("Ushbu ma'lumot o'chirilsinmi?")) {
            data = data.filter(i => i.id !== id);
            updateUI();
        }
    }

    function deleteSelected() {
        const selected = Array.from(document.querySelectorAll('.select-check:checked')).map(cb => parseInt(cb.dataset.id));
        if(selected.length === 0) return alert("Hech narsa tanlanmadi!");
        if(confirm(selected.length + " ta ma'lumot o'chirilsinmi?")) {
            data = data.filter(i => !selected.includes(i.id));
            updateUI();
        }
    }

    function selectAllInDate(date, master) {
        const checks = document.querySelectorAll(`#body-${date} .select-check`);
        checks.forEach(c => c.checked = master.checked);
    }

    function clearAllData() {
        if(confirm("Hamma ma'lumotlar o'chib ketadi. Rozimisiz?")) {
            data = []; updateUI();
        }
    }

    function exportToExcel() {
        if(data.length === 0) return;
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Hisobot");
        XLSX.writeFile(wb, "Moliya_Hisoboti.xlsx");
    }
</script>

</body>
</html>
