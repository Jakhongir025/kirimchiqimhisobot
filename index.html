<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moliya Nazorati Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --info: #2980b9;
            --warning: #f39c12;
            --light: #f8f9fa;
            --white: #ffffff;
            --gray: #95a5a6;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f7; padding: 15px; color: #333; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; }

        .inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: var(--light);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #ddd;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; }

        input, select, button, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 15px; outline: none; font-family: inherit; }
        
        /* Summa kiritish stili */
        .amount-input { border: 2px solid var(--info); font-weight: bold; background: #fff; }

        #flight-details {
            grid-column: 1 / -1;
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            background: #e1f5fe;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed var(--info);
        }

        .full-width { grid-column: 1 / -1; }

        .btn-add { background: var(--success); color: white; border: none; cursor: pointer; font-weight: bold; height: 50px; margin-top: auto; }
        .btn-update { background: var(--warning); color: white; border: none; cursor: pointer; font-weight: bold; height: 50px; margin-top: auto; display: none; }
        .btn-cancel { background: var(--gray); color: white; border: none; cursor: pointer; font-weight: bold; height: 50px; margin-top: auto; display: none; }

        /* Statistika */
        .summary-boxes {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }
        .box { padding: 20px; border-radius: 15px; color: white; }
        .box h3 { margin: 0 0 15px 0; font-size: 14px; opacity: 0.9; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; text-align: center; }
        .curr-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; margin-bottom: 8px; }

        .box-income { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .box-expense { background: linear-gradient(135deg, #e74c3c, #ff7675); }
        .box-balance { background: linear-gradient(135deg, #2c3e50, #34495e); }

        /* Qidiruv */
        .search-bar { margin-bottom: 20px; position: relative; }
        .search-bar input { width: 100%; padding: 15px 15px 15px 45px; box-sizing: border-box; border-radius: 12px; border: 2px solid var(--info); font-size: 16px; }
        .search-bar::before { content: '🔍'; position: absolute; left: 15px; top: 15px; font-size: 20px; }

        /* Jadval */
        .date-section { margin-top: 25px; border-radius: 15px; overflow: hidden; border: 1px solid #ddd; background: white; }
        .date-header { background: #f1f5f9; padding: 15px 20px; font-weight: bold; color: var(--primary); border-bottom: 2px solid #cbd5e1; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: left; vertical-align: top; }
        th { background: #f8fafc; color: #64748b; font-size: 12px; text-transform: uppercase; }

        .comment-text { font-size: 13px; color: #666; font-style: italic; display: block; margin-top: 5px; max-width: 300px; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }
        .badge-paid { background: #dcfce7; color: #166534; }
        .badge-unpaid { background: #fee2e2; color: #991b1b; }

        .btn-edit { background: #fef9c3; color: #854d0e; padding: 8px; border-radius: 8px; cursor: pointer; border: none; }
        .btn-del { background: #fee2e2; color: #991b1b; padding: 8px; border-radius: 8px; cursor: pointer; border: none; }

        .footer-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-excel { background: var(--info); color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="formTitle">Moliya va Aviabilet Nazorati</h2>

    <!-- Form -->
    <div class="inputs">
        <div class="input-group">
            <label>Sana</label>
            <input type="date" id="customDate">
        </div>
        <div class="input-group">
            <label>Kimga / Kimdan</label>
            <input type="text" id="name" placeholder="F.I.SH">
        </div>
        <div class="input-group">
            <label>Summa</label>
            <input type="text" id="amount" class="amount-input" placeholder="Summa va valyuta...">
        </div>
        <div class="input-group">
            <label>Bo'lim</label>
            <select id="category" onchange="toggleFlightFields()">
                <option value="Aviabilet">Aviabilet</option>
                <option value="Qarz">Qarzlar</option>
                <option value="Xarajat">Boshqa xarajatlar</option>
            </select>
        </div>
        
        <div id="flight-details">
            <div class="input-group"><label>Yo'nalish</label><input type="text" id="route" placeholder="Toshkent-Seul"></div>
            <div class="input-group"><label>Bilet №</label><input type="text" id="ticketNum" placeholder="12345678"></div>
        </div>

        <div class="input-group">
            <label>Turi</label>
            <select id="type">
                <option value="income">Kirim (+)</option>
                <option value="expense">Chiqim (-)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Holati</label>
            <select id="status">
                <option value="paid">To'lov qilingan</option>
                <option value="unpaid">Kutilmoqda (Qarz)</option>
            </select>
        </div>
        <div class="input-group full-width">
            <label>Izoh</label>
            <textarea id="comment" rows="1" placeholder="Batafsil ma'lumot yozing..."></textarea>
        </div>

        <button class="btn-add" id="btnAdd" onclick="addItem()">Qo'shish</button>
        <button class="btn-update" id="btnUpdate" onclick="saveEdit()">Saqlash</button>
        <button class="btn-cancel" id="btnCancel" onclick="cancelEdit()">Bekor</button>
    </div>

    <!-- Statistika -->
    <div class="summary-boxes">
        <div class="box box-income">
            <h3>JAMI KIRIM</h3>
            <div class="curr-row"><span>UZS</span> <span id="incUZS">0</span></div>
            <div class="curr-row"><span>USD</span> <span id="incUSD">0</span></div>
            <div class="curr-row"><span>RUB</span> <span id="incRUB">0</span></div>
        </div>
        <div class="box box-expense">
            <h3>JAMI CHIQIM</h3>
            <div class="curr-row"><span>UZS</span> <span id="expUZS">0</span></div>
            <div class="curr-row"><span>USD</span> <span id="expUSD">0</span></div>
            <div class="curr-row"><span>RUB</span> <span id="expRUB">0</span></div>
        </div>
        <div class="box box-balance">
            <h3>BALANS</h3>
            <div class="curr-row"><span>UZS</span> <span id="balUZS">0</span></div>
            <div class="curr-row"><span>USD</span> <span id="balUSD">0</span></div>
            <div class="curr-row"><span>RUB</span> <span id="balRUB">0</span></div>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Ism, bilet, izoh yoki summa bo'yicha qidirish..." oninput="updateUI()">
    </div>

    <div class="footer-actions">
        <button class="btn-excel" onclick="exportToExcel()">📥 Excelga yuklash</button>
        <button class="btn-excel" style="background: var(--danger);" onclick="deleteSelected()">🗑️ O'chirish</button>
        <button class="btn-excel" style="background: var(--primary);" onclick="clearAll()">⚠️ Hammasini tozalash</button>
    </div>

    <div id="tableContent"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('myFinDataV2')) || [];
    let editId = null;

    window.onload = () => {
        document.getElementById('customDate').value = new Date().toISOString().split('T')[0];
        toggleFlightFields();
        updateUI();
    };

    function toggleFlightFields() {
        const cat = document.getElementById('category').value;
        document.getElementById('flight-details').style.display = (cat === 'Aviabilet') ? 'grid' : 'none';
    }

    // Summa va valyutani ajratib olish funksiyasi
    function parseAmount(str) {
        let clean = str.toLowerCase().replace(/\s/g, '').replace(/,/g, '.');
        let amount = parseFloat(clean.replace(/[^\d.]/g, '')) || 0;
        let currency = "UZS"; // default

        if (clean.includes("usd") || clean.includes("$")) currency = "USD";
        else if (clean.includes("rub")) currency = "RUB";
        
        return { amount, currency };
    }

    function formatNumber(n) { return Number(n).toLocaleString('ru-RU'); }

    function addItem() {
        const name = document.getElementById('name').value;
        const amountRaw = document.getElementById('amount').value;
        if(!name || !amountRaw) return alert("Ism va summani kiriting!");

        const parsed = parseAmount(amountRaw);
        
        const item = {
            id: Date.now(),
            date: document.getElementById('customDate').value,
            name: name,
            amount: parsed.amount,
            currency: parsed.currency,
            category: document.getElementById('category').value,
            route: document.getElementById('route').value,
            ticketNum: document.getElementById('ticketNum').value,
            comment: document.getElementById('comment').value,
            type: document.getElementById('type').value,
            status: document.getElementById('status').value
        };

        db.push(item);
        saveDB();
        updateUI();
        resetForm();
    }

    function startEdit(id) {
        editId = id;
        const item = db.find(i => i.id === id);
        document.getElementById('customDate').value = item.date;
        document.getElementById('name').value = item.name;
        document.getElementById('amount').value = `${item.amount} ${item.currency}`;
        document.getElementById('category').value = item.category;
        document.getElementById('route').value = item.route;
        document.getElementById('ticketNum').value = item.ticketNum;
        document.getElementById('comment').value = item.comment;
        document.getElementById('type').value = item.type;
        document.getElementById('status').value = item.status;
        
        toggleFlightFields();
        document.getElementById('btnAdd').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'block';
        document.getElementById('btnCancel').style.display = 'block';
        document.getElementById('formTitle').innerText = "Tahrirlash rejimi";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function saveEdit() {
        const idx = db.findIndex(i => i.id === editId);
        const parsed = parseAmount(document.getElementById('amount').value);
        
        db[idx] = {
            ...db[idx],
            date: document.getElementById('customDate').value,
            name: document.getElementById('name').value,
            amount: parsed.amount,
            currency: parsed.currency,
            category: document.getElementById('category').value,
            route: document.getElementById('route').value,
            ticketNum: document.getElementById('ticketNum').value,
            comment: document.getElementById('comment').value,
            type: document.getElementById('type').value,
            status: document.getElementById('status').value
        };
        
        cancelEdit();
        saveDB();
        updateUI();
    }

    function cancelEdit() {
        editId = null;
        resetForm();
        document.getElementById('btnAdd').style.display = 'block';
        document.getElementById('btnUpdate').style.display = 'none';
        document.getElementById('btnCancel').style.display = 'none';
        document.getElementById('formTitle').innerText = "Moliya va Aviabilet Nazorati";
    }

    function resetForm() {
        document.getElementById('name').value = "";
        document.getElementById('amount').value = "";
        document.getElementById('route').value = "";
        document.getElementById('ticketNum').value = "";
        document.getElementById('comment').value = "";
        document.getElementById('customDate').value = new Date().toISOString().split('T')[0];
    }

    function updateUI() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const content = document.getElementById('tableContent');
        content.innerHTML = "";

        let totals = { inc: {UZS:0, USD:0, RUB:0}, exp: {UZS:0, USD:0, RUB:0} };

        let filtered = db.filter(i => 
            i.name.toLowerCase().includes(search) || 
            i.ticketNum.toLowerCase().includes(search) || 
            i.route.toLowerCase().includes(search) ||
            i.comment.toLowerCase().includes(search) ||
            i.amount.toString().includes(search)
        );

        db.forEach(i => {
            if(i.type === 'income') totals.inc[i.currency] += i.amount;
            else totals.exp[i.currency] += i.amount;
        });

        ['UZS', 'USD', 'RUB'].forEach(c => {
            document.getElementById(`inc${c}`).innerText = formatNumber(totals.inc[c]);
            document.getElementById(`exp${c}`).innerText = formatNumber(totals.exp[c]);
            document.getElementById(`bal${c}`).innerText = formatNumber(totals.inc[c] - totals.exp[c]);
        });

        const groups = filtered.reduce((acc, item) => {
            if (!acc[item.date]) acc[item.date] = [];
            acc[item.date].push(item);
            return acc;
        }, {});

        const sortedDates = Object.keys(groups).sort((a,b) => new Date(b) - new Date(a));

        sortedDates.forEach(date => {
            const section = document.createElement('div');
            section.className = 'date-section';
            section.innerHTML = `
                <div class="date-header">📅 ${date}</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th><input type="checkbox" onclick="selectAll(this, '${date}')"></th>
                                <th>F.I.SH</th>
                                <th>Bo'lim va Izoh</th>
                                <th>Summa</th>
                                <th>Holat</th>
                                <th>Amallar</th>
                            </tr>
                        </thead>
                        <tbody id="rows-${date}">
                            ${groups[date].map(item => `
                                <tr>
                                    <td><input type="checkbox" class="chk-item" data-id="${item.id}"></td>
                                    <td><strong>${item.name}</strong></td>
                                    <td>
                                        <span style="color:var(--info); font-weight:bold;">${item.category}</span>
                                        ${item.category==='Aviabilet' ? `<br><small>📍 ${item.route} | 🎫 ${item.ticketNum}</small>` : ''}
                                        <span class="comment-text">${item.comment ? '💬 ' + item.comment : ''}</span>
                                    </td>
                                    <td style="font-weight:bold; color:${item.type==='income'?'#27ae60':'#e74c3c'}">
                                        ${item.type==='income'?'+':'-'}${formatNumber(item.amount)} ${item.currency}
                                    </td>
                                    <td>
                                        <button class="badge ${item.status==='paid'?'badge-paid':'badge-unpaid'}" onclick="toggleStatus(${item.id})">
                                            ${item.status==='paid'?'To\'landi':'Qarz'}
                                        </button>
                                    </td>
                                    <td>
                                        <button class="btn-edit" onclick="startEdit(${item.id})">✏️</button>
                                        <button class="btn-del" onclick="deleteItem(${item.id})">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            content.appendChild(section);
        });
    }

    function toggleStatus(id) {
        const idx = db.findIndex(i => i.id === id);
        db[idx].status = db[idx].status === 'paid' ? 'unpaid' : 'paid';
        saveDB(); updateUI();
    }

    function deleteItem(id) {
        if(confirm("O'chirilsinmi?")) {
            db = db.filter(i => i.id !== id);
            saveDB(); updateUI();
        }
    }

    function selectAll(master, date) {
        const items = document.querySelectorAll(`#rows-${date} .chk-item`);
        items.forEach(i => i.checked = master.checked);
    }

    function deleteSelected() {
        const checked = Array.from(document.querySelectorAll('.chk-item:checked')).map(i => parseInt(i.dataset.id));
        if(!checked.length) return;
        if(confirm("Tanlanganlar o'chirilsinmi?")) {
            db = db.filter(i => !checked.includes(i.id));
            saveDB(); updateUI();
        }
    }

    function clearAll() {
        if(confirm("Barcha ma'lumotlar butunlay o'chib ketadi! Rozimisiz?")) {
            db = []; saveDB(); updateUI();
        }
    }

    function saveDB() { localStorage.setItem('myFinDataV2', JSON.stringify(db)); }

    function exportToExcel() {
        if(!db.length) return;
        const dataForExcel = db.map(i => ({
            Sana: i.date,
            Ism: i.name,
            Summa: i.amount,
            Valyuta: i.currency,
            Tur: i.type === 'income' ? 'Kirim' : 'Chiqim',
            Bolim: i.category,
            Yonalish: i.route,
            Bilet_N: i.ticketNum,
            Izoh: i.comment,
            Holat: i.status === 'paid' ? 'Tolangan' : 'Qarz'
        }));
        const ws = XLSX.utils.json_to_sheet(dataForExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Hisobot");
        XLSX.writeFile(wb, "Moliya_Nazorati_Hisobot.xlsx");
    }
</script>
</body>
</html>
