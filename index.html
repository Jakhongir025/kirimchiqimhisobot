<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moliya va Aviabilet Nazorati</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --info: #2980b9;
            --warning: #f39c12;
            --light: #f8f9fa;
            --dark: #34495e;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f7; padding: 20px; color: #333; }
        .container { max-width: 1300px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; }

        .inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: var(--light);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #ddd;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #666; }

        input, select, button { padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 14px; outline: none; }
        
        #flight-details {
            grid-column: 1 / -1;
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: #e1f5fe;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed var(--info);
        }

        .btn-add { background: var(--success); color: white; border: none; cursor: pointer; font-weight: bold; height: 48px; margin-top: auto; }
        .btn-update { background: var(--warning); color: white; border: none; cursor: pointer; font-weight: bold; height: 48px; margin-top: auto; display: none; }
        .btn-cancel { background: #95a5a6; color: white; border: none; cursor: pointer; font-weight: bold; height: 48px; margin-top: auto; display: none; }
        
        .action-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-excel { background: var(--info); color: white; border: none; cursor: pointer; font-weight: bold; padding: 10px 20px; border-radius: 8px; }
        .btn-delete-selected { background: #e67e22; color: white; border: none; cursor: pointer; font-weight: bold; padding: 10px 20px; border-radius: 8px; }
        .btn-clear-all { background: var(--danger); color: white; border: none; cursor: pointer; font-weight: bold; padding: 10px 20px; border-radius: 8px; }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .status-paid { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-unpaid { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .summary-boxes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .box { padding: 20px; border-radius: 15px; color: white; }
        .box h3 { margin: 0; font-size: 14px; opacity: 0.9; }
        .box div { font-size: 24px; font-weight: bold; margin-top: 10px; }
        
        .box-income { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .box-expense { background: linear-gradient(135deg, #e74c3c, #ff7675); }
        .box-balance { background: linear-gradient(135deg, #2c3e50, #34495e); }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1100px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f4f6f8; color: var(--primary); }
        
        .flight-info { font-size: 12px; color: #2980b9; display: block; margin-top: 4px; }
        
        .btn-action { display: flex; gap: 5px; }
        .edit-btn { background: #f1c40f; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .delete-btn { background: #eee; color: #666; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .delete-btn:hover { background: #e74c3c; color: white; }

        /* Checkbox stili */
        .select-row { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="formTitle">Moliya va To'lov Nazorati</h2>

    <div class="inputs">
        <div class="input-group">
            <label>Sana</label>
            <input type="date" id="customDate">
        </div>
        <div class="input-group">
            <label>Kimga / Kimdan</label>
            <input type="text" id="name" placeholder="Ism sharif">
        </div>
        <div class="input-group">
            <label>Summa (so'm)</label>
            <input type="text" id="amount" placeholder="0" oninput="formatInput(this)">
        </div>
        <div class="input-group">
            <label>Bo'lim</label>
            <select id="category" onchange="toggleFlightFields()">
                <option value="Aviabilet">Aviabilet</option>
                <option value="Qarz">Qarzlar</option>
                <option value="Oziq-ovqat">Oziq-ovqat</option>
                <option value="Xizmatlar">Xizmatlar</option>
                <option value="Boshqa">Boshqa xarajatlar</option>
            </select>
        </div>
        <div id="flight-details">
            <div class="input-group">
                <label>Yo'nalish</label>
                <input type="text" id="route" placeholder="Toshkent - Istanbul">
            </div>
            <div class="input-group">
                <label>Bilet Raqami</label>
                <input type="text" id="ticketNum" placeholder="235-000000000">
            </div>
        </div>
        <div class="input-group">
            <label>Izoh</label>
            <input type="text" id="desc" placeholder="...">
        </div>
        <div class="input-group">
            <label>Turi</label>
            <select id="type">
                <option value="expense">Xarajat / Berdim (-)</option>
                <option value="income">Pul oldim (+)</option>
            </select>
        </div>
        <div class="input-group">
            <label>To'lov holati</label>
            <select id="initialStatus">
                <option value="paid">To'lov qildi</option>
                <option value="unpaid">Hali to'lov qilmadi</option>
            </select>
        </div>
        <button class="btn-add" id="btnAdd" onclick="addItem()">Ro'yxatga qo'shish</button>
        <button class="btn-update" id="btnUpdate" onclick="saveEdit()">O'zgarishlarni saqlash</button>
        <button class="btn-cancel" id="btnCancel" onclick="cancelEdit()">Bekor qilish</button>
    </div>

    <div class="summary-boxes">
        <div class="box box-income"><h3>Jami Kirim</h3><div id="totalIncome">0</div></div>
        <div class="box box-expense"><h3>Jami Chiqim</h3><div id="totalExpense">0</div></div>
        <div class="box box-balance"><h3>Balans</h3><div id="totalBalance">0</div></div>
    </div>

    <div class="action-buttons">
        <button class="btn-excel" onclick="exportToExcel()">📥 Excelga yuklash</button>
        <button class="btn-delete-selected" onclick="deleteSelected()">🗑️ Tanlanganlarni o'chirish</button>
        <button class="btn-clear-all" onclick="clearAllData()">⚠️ Hammasini tozalash</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th>
                    <th>Sana</th>
                    <th>Ism</th>
                    <th>Bo'lim</th>
                    <th>Summa</th>
                    <th>Holat</th>
                    <th>Izoh</th>
                    <th>Amallar</th>
                </tr>
            </thead>
            <tbody id="listBody"></tbody>
        </table>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('paymentControlData')) || [];
    let editId = null;

    window.onload = () => { resetDate(); updateUI(); };

    function resetDate() {
        document.getElementById('customDate').value = new Date().toISOString().split('T')[0];
    }

    function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "); }
    
    function formatInput(input) {
        let value = input.value.replace(/\D/g, "");
        input.value = formatNumber(value);
    }

    function toggleFlightFields() {
        const cat = document.getElementById('category').value;
        document.getElementById('flight-details').style.display = (cat === 'Aviabilet') ? 'grid' : 'none';
    }

    function addItem() {
        const date = document.getElementById('customDate').value;
        const name = document.getElementById('name').value;
        const amount = document.getElementById('amount').value.replace(/\s/g, "");
        if(!date || !name || !amount) return alert("Sana, ism va summani kiriting!");

        const newItem = {
            id: Date.now(),
            date, name,
            amount: parseFloat(amount),
            category: document.getElementById('category').value,
            route: document.getElementById('route').value,
            ticketNum: document.getElementById('ticketNum').value,
            desc: document.getElementById('desc').value,
            type: document.getElementById('type').value,
            status: document.getElementById('initialStatus').value
        };

        data.push(newItem);
        updateUI();
        clearInputs();
    }

    function startEdit(id) {
        editId = id;
        const item = data.find(i => i.id === id);
        document.getElementById('customDate').value = item.date;
        document.getElementById('name').value = item.name;
        document.getElementById('amount').value = formatNumber(item.amount);
        document.getElementById('category').value = item.category;
        document.getElementById('route').value = item.route;
        document.getElementById('ticketNum').value = item.ticketNum;
        document.getElementById('desc').value = item.desc;
        document.getElementById('type').value = item.type;
        document.getElementById('initialStatus').value = item.status;
        
        toggleFlightFields();
        document.getElementById('btnAdd').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'block';
        document.getElementById('btnCancel').style.display = 'block';
        document.getElementById('formTitle').innerText = "Tahrirlash Rejimi";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function saveEdit() {
        const idx = data.findIndex(i => i.id === editId);
        if(idx !== -1) {
            data[idx].date = document.getElementById('customDate').value;
            data[idx].name = document.getElementById('name').value;
            data[idx].amount = parseFloat(document.getElementById('amount').value.replace(/\s/g, ""));
            data[idx].category = document.getElementById('category').value;
            data[idx].route = document.getElementById('route').value;
            data[idx].ticketNum = document.getElementById('ticketNum').value;
            data[idx].desc = document.getElementById('desc').value;
            data[idx].type = document.getElementById('type').value;
            data[idx].status = document.getElementById('initialStatus').value;
            cancelEdit();
            updateUI();
        }
    }

    function cancelEdit() {
        editId = null;
        clearInputs();
        document.getElementById('btnAdd').style.display = 'block';
        document.getElementById('btnUpdate').style.display = 'none';
        document.getElementById('btnCancel').style.display = 'none';
        document.getElementById('formTitle').innerText = "Moliya va To'lov Nazorati";
    }

    function clearInputs() {
        document.getElementById('name').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('route').value = '';
        document.getElementById('ticketNum').value = '';
        resetDate();
    }

    function updateUI() {
        localStorage.setItem('paymentControlData', JSON.stringify(data));
        const listBody = document.getElementById('listBody');
        listBody.innerHTML = '';
        let inc = 0, exp = 0;

        data.sort((a,b) => new Date(b.date) - new Date(a.date));

        data.forEach(item => {
            if(item.type === 'income') inc += item.amount; else exp += item.amount;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="checkbox" class="select-row" data-id="${item.id}"></td>
                <td>${item.date}</td>
                <td><strong>${item.name}</strong></td>
                <td>${item.category} ${item.route ? `<br><small class="flight-info">${item.route}</small>` : ''}</td>
                <td style="color: ${item.type === 'income' ? 'green' : 'red'}; font-weight: bold;">
                    ${item.type === 'income' ? '+' : '-'}${formatNumber(item.amount)}
                </td>
                <td>
                    <button class="status-badge ${item.status==='paid'?'status-paid':'status-unpaid'}" onclick="toggleStatus(${item.id})">
                        ${item.status==='paid'?'✅ To\'langan':'❌ Qarz'}
                    </button>
                </td>
                <td><small>${item.desc || '-'}</small></td>
                <td class="btn-action">
                    <button class="edit-btn" onclick="startEdit(${item.id})">✏️</button>
                    <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️</button>
                </td>
            `;
            listBody.appendChild(tr);
        });

        document.getElementById('totalIncome').innerText = formatNumber(inc);
        document.getElementById('totalExpense').innerText = formatNumber(exp);
        document.getElementById('totalBalance').innerText = formatNumber(inc - exp);
        document.getElementById('selectAll').checked = false;
    }

    function toggleStatus(id) {
        const idx = data.findIndex(i => i.id === id);
        data[idx].status = data[idx].status === 'paid' ? 'unpaid' : 'paid';
        updateUI();
    }

    function deleteItem(id) {
        if(confirm("Ushbu ma'lumot o'chirilsinmi?")) {
            data = data.filter(i => i.id !== id);
            updateUI();
        }
    }

    // TANLANGANLARNI O'CHIRISH
    function toggleSelectAll(master) {
        document.querySelectorAll('.select-row').forEach(cb => cb.checked = master.checked);
    }

    function deleteSelected() {
        const selectedCbs = document.querySelectorAll('.select-row:checked');
        if(selectedCbs.length === 0) return alert("Hech qaysi qator tanlanmagan!");
        
        if(confirm(`${selectedCbs.length} ta ma'lumotni o'chirib tashlamoqchimisiz?`)) {
            const idsToDelete = Array.from(selectedCbs).map(cb => parseInt(cb.dataset.id));
            data = data.filter(item => !idsToDelete.includes(item.id));
            updateUI();
        }
    }

    // HAMMASINI O'CHIRISH
    function clearAllData() {
        if(confirm("DIQQAT! Barcha saqlangan ma'lumotlar butunlay o'chib ketadi. Rozimisiz?")) {
            data = [];
            updateUI();
        }
    }

    function exportToExcel() {
        if(data.length === 0) return alert("Ma'lumot mavjud emas!");
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Hisobot");
        XLSX.writeFile(wb, "Moliya_Hisoboti.xlsx");
    }
</script>

</body>
</html>
