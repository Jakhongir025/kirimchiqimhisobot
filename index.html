<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moliya va Aviabilet Nazorati (Pro)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --info: #2980b9;
            --warning: #f39c12;
            --light: #f8f9fa;
            --dark: #34495e;
            --gray: #95a5a6;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f7; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; }

        /* Inputlar paneli */
        .inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: var(--light);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #ddd;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #666; }

        input, select, button { padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 14px; outline: none; }
        
        #flight-details {
            grid-column: 1 / -1;
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: #e1f5fe;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed var(--info);
        }

        .btn-add { background: var(--success); color: white; border: none; cursor: pointer; font-weight: bold; height: 48px; margin-top: auto; }
        .btn-update { background: var(--warning); color: white; border: none; cursor: pointer; font-weight: bold; height: 48px; margin-top: auto; display: none; }
        .btn-cancel { background: var(--gray); color: white; border: none; cursor: pointer; font-weight: bold; height: 48px; margin-top: auto; display: none; }

        /* Qidiruv va Filtrlash paneli */
        .search-container {
            margin-bottom: 20px;
            padding: 15px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #ddd;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .search-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--info); font-size: 16px; }

        .summary-boxes {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .box { padding: 20px; border-radius: 15px; color: white; text-align: center; }
        .box h3 { margin: 0; font-size: 14px; opacity: 0.9; text-transform: uppercase; }
        .box div { font-size: 22px; font-weight: bold; margin-top: 10px; }
        .box-income { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .box-expense { background: linear-gradient(135deg, #e74c3c, #ff7675); }
        .box-balance { background: linear-gradient(135deg, #2c3e50, #34495e); }

        /* Sana bo'yicha bo'limlar */
        .date-section { margin-top: 30px; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; }
        .date-header { 
            background: #f1f5f9; padding: 12px 20px; font-weight: bold; 
            color: var(--primary); border-bottom: 2px solid #cbd5e1;
            display: flex; justify-content: space-between;
        }

        .table-container { overflow-x: auto; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8fafc; font-size: 13px; color: #64748b; }

        .status-badge {
            padding: 5px 10px; border-radius: 20px; font-size: 11px;
            cursor: pointer; border: none; font-weight: bold;
        }
        .status-paid { background: #dcfce7; color: #166534; }
        .status-unpaid { background: #fee2e2; color: #991b1b; }

        .action-btns { display: flex; gap: 8px; }
        .edit-btn { background: #fef9c3; color: #854d0e; border: none; padding: 6px; border-radius: 6px; cursor: pointer; }
        .delete-btn { background: #fee2e2; color: #991b1b; border: none; padding: 6px; border-radius: 6px; cursor: pointer; }
        
        .action-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-excel { background: var(--info); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-danger-all { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        
        .select-check { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="formTitle">Moliya va Aviabilet Nazorati</h2>

    <!-- Ma'lumot kiritish -->
    <div class="inputs">
        <div class="input-group"><label>Sana</label><input type="date" id="customDate"></div>
        <div class="input-group"><label>Ism sharif</label><input type="text" id="name" placeholder="Eshmatov Toshmat"></div>
        <div class="input-group"><label>Summa (so'm)</label><input type="text" id="amount" placeholder="0" oninput="formatInput(this)"></div>
        <div class="input-group">
            <label>Bo'lim</label>
            <select id="category" onchange="toggleFlightFields()">
                <option value="Aviabilet">Aviabilet</option>
                <option value="Qarz">Qarzlar</option>
                <option value="Oziq-ovqat">Oziq-ovqat</option>
                <option value="Xizmatlar">Xizmatlar</option>
                <option value="Boshqa">Boshqa</option>
            </select>
        </div>
        <div id="flight-details">
            <div class="input-group"><label>Yo'nalish</label><input type="text" id="route" placeholder="Tosh-Istanbul"></div>
            <div class="input-group"><label>Bilet №</label><input type="text" id="ticketNum" placeholder="235-000..."></div>
        </div>
        <div class="input-group"><label>Izoh</label><input type="text" id="desc" placeholder="..."></div>
        <div class="input-group">
            <label>Turi</label>
            <select id="type">
                <option value="expense">Xarajat / Berdim (-)</option>
                <option value="income">Pul oldim (+)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Holati</label>
            <select id="initialStatus">
                <option value="paid">To'lov qildi</option>
                <option value="unpaid">Qarz (to'lamadi)</option>
            </select>
        </div>
        <button class="btn-add" id="btnAdd" onclick="addItem()">Qo'shish</button>
        <button class="btn-update" id="btnUpdate" onclick="saveEdit()">Saqlash</button>
        <button class="btn-cancel" id="btnCancel" onclick="cancelEdit()">Bekor</button>
    </div>

    <!-- Statistika -->
    <div class="summary-boxes">
        <div class="box box-income"><h3>Jami Kirim</h3><div id="totalIncome">0</div></div>
        <div class="box box-expense"><h3>Jami Chiqim</h3><div id="totalExpense">0</div></div>
        <div class="box box-balance"><h3>Balans</h3><div id="totalBalance">0</div></div>
    </div>

    <!-- Qidiruv va Amallar -->
    <div class="search-container">
        🔍 <input type="text" id="searchInput" class="search-input" placeholder="Ism, bilet raqami yoki narx bo'yicha qidirish..." oninput="updateUI()">
    </div>

    <div class="action-bar">
        <button class="btn-excel" onclick="exportToExcel()">📥 Excel</button>
        <button class="btn-danger-all" style="background: #f39c12;" onclick="deleteSelected()">🗑️ Tanlanganlarni o'chirish</button>
        <button class="btn-danger-all" onclick="clearAllData()">⚠️ Hammasini tozalash</button>
    </div>

    <!-- Jadval display -->
    <div id="tableDisplay"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('finData')) || [];
    let editId = null;

    window.onload = () => { resetDate(); updateUI(); };

    function resetDate() { document.getElementById('customDate').value = new Date().toISOString().split('T')[0]; }
    function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "); }
    function formatInput(input) {
        let value = input.value.replace(/\D/g, "");
        input.value = formatNumber(value);
    }

    function toggleFlightFields() {
        const cat = document.getElementById('category').value;
        document.getElementById('flight-details').style.display = (cat === 'Aviabilet') ? 'grid' : 'none';
    }

    function addItem() {
        const date = document.getElementById('customDate').value;
        const name = document.getElementById('name').value;
        const amountStr = document.getElementById('amount').value.replace(/\s/g, "");
        if(!date || !name || !amountStr) return alert("Sana, ism va summani kiriting!");

        const newItem = {
            id: Date.now(),
            date, name,
            amount: parseFloat(amountStr),
            category: document.getElementById('category').value,
            route: document.getElementById('route').value,
            ticketNum: document.getElementById('ticketNum').value,
            desc: document.getElementById('desc').value,
            type: document.getElementById('type').value,
            status: document.getElementById('initialStatus').value
        };

        data.push(newItem);
        clearInputs();
        updateUI();
    }

    function startEdit(id) {
        editId = id;
        const item = data.find(i => i.id === id);
        document.getElementById('customDate').value = item.date;
        document.getElementById('name').value = item.name;
        document.getElementById('amount').value = formatNumber(item.amount);
        document.getElementById('category').value = item.category;
        document.getElementById('route').value = item.route;
        document.getElementById('ticketNum').value = item.ticketNum;
        document.getElementById('desc').value = item.desc;
        document.getElementById('type').value = item.type;
        document.getElementById('initialStatus').value = item.status;
        
        toggleFlightFields();
        document.getElementById('btnAdd').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'block';
        document.getElementById('btnCancel').style.display = 'block';
        document.getElementById('formTitle').innerText = "Tahrirlash";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function saveEdit() {
        const idx = data.findIndex(i => i.id === editId);
        if(idx !== -1) {
            data[idx].date = document.getElementById('customDate').value;
            data[idx].name = document.getElementById('name').value;
            data[idx].amount = parseFloat(document.getElementById('amount').value.replace(/\s/g, ""));
            data[idx].category = document.getElementById('category').value;
            data[idx].route = document.getElementById('route').value;
            data[idx].ticketNum = document.getElementById('ticketNum').value;
            data[idx].desc = document.getElementById('desc').value;
            data[idx].type = document.getElementById('type').value;
            data[idx].status = document.getElementById('initialStatus').value;
            cancelEdit();
            updateUI();
        }
    }

    function cancelEdit() {
        editId = null; clearInputs();
        document.getElementById('btnAdd').style.display = 'block';
        document.getElementById('btnUpdate').style.display = 'none';
        document.getElementById('btnCancel').style.display = 'none';
        document.getElementById('formTitle').innerText = "Moliya va To'lov Nazorati";
    }

    function clearInputs() {
        document.getElementById('name').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('route').value = '';
        document.getElementById('ticketNum').value = '';
        resetDate();
    }

    // ASOSIY UI YANGILASH FUNKSIYASI (QIDIRUV VA GURUHLASH)
    function updateUI() {
        localStorage.setItem('finData', JSON.stringify(data));
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const display = document.getElementById('tableDisplay');
        display.innerHTML = '';

        // Filtrlash
        let filtered = data.filter(item => 
            item.name.toLowerCase().includes(searchTerm) || 
            item.ticketNum.toLowerCase().includes(searchTerm) || 
            item.amount.toString().includes(searchTerm) ||
            item.category.toLowerCase().includes(searchTerm)
        );

        // Statistika (Hamma ma'lumotlar uchun emas, faqat filtrdagi uchun xohlasangiz filterni ishlating)
        let inc = 0, exp = 0;
        data.forEach(item => {
            if(item.type === 'income') inc += item.amount; else exp += item.amount;
        });
        document.getElementById('totalIncome').innerText = formatNumber(inc);
        document.getElementById('totalExpense').innerText = formatNumber(exp);
        document.getElementById('totalBalance').innerText = formatNumber(inc - exp);

        // Sana bo'yicha guruhlash
        const grouped = filtered.reduce((groups, item) => {
            const date = item.date;
            if (!groups[date]) groups[date] = [];
            groups[date].push(item);
            return groups;
        }, {});

        // Sanalarni teskari tartibda saralash
        const sortedDates = Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a));

        if(sortedDates.length === 0) {
            display.innerHTML = '<p style="text-align:center; color:gray;">Ma\'lumot topilmadi.</p>';
            return;
        }

        sortedDates.forEach(date => {
            const section = document.createElement('div');
            section.className = 'date-section';

            let dateIncome = 0;
            let dateExpense = 0;
            grouped[date].forEach(i => i.type === 'income' ? dateIncome += i.amount : dateExpense += i.amount);

            section.innerHTML = `
                <div class="date-header">
                    <span>📅 ${date}</span>
                    <span style="font-size: 12px; font-weight: normal;">Kirim: <b style="color:green">+${formatNumber(dateIncome)}</b> | Chiqim: <b style="color:red">-${formatNumber(dateExpense)}</b></span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th width="30"></th>
                                <th>Ism</th>
                                <th>Bo'lim / Tafsilot</th>
                                <th>Summa</th>
                                <th>Holat</th>
                                <th>Izoh</th>
                                <th width="80">Amallar</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${grouped[date].map(item => `
                                <tr>
                                    <td><input type="checkbox" class="select-check" data-id="${item.id}"></td>
                                    <td><strong>${item.name}</strong></td>
                                    <td>
                                        <b>${item.category}</b>
                                        ${item.ticketNum ? `<br><small class="flight-info">🎫 ${item.ticketNum} | ${item.route}</small>` : ''}
                                    </td>
                                    <td style="color:${item.type==='income'?'green':'red'}; font-weight:bold;">
                                        ${item.type==='income'?'+':'-'}${formatNumber(item.amount)}
                                    </td>
                                    <td>
                                        <button class="status-badge ${item.status==='paid'?'status-paid':'status-unpaid'}" onclick="toggleStatus(${item.id})">
                                            ${item.status==='paid'?'✅ To\'langan':'❌ Qarz'}
                                        </button>
                                    </td>
                                    <td><small>${item.desc || '-'}</small></td>
                                    <td class="action-btns">
                                        <button class="edit-btn" onclick="startEdit(${item.id})">✏️</button>
                                        <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            display.appendChild(section);
        });
    }

    function toggleStatus(id) {
        const idx = data.findIndex(i => i.id === id);
        data[idx].status = data[idx].status === 'paid' ? 'unpaid' : 'paid';
        updateUI();
    }

    function deleteItem(id) {
        if(confirm("Ushbu ma'lumot o'chirilsinmi?")) {
            data = data.filter(i => i.id !== id);
            updateUI();
        }
    }

    function deleteSelected() {
        const selected = Array.from(document.querySelectorAll('.select-check:checked')).map(cb => parseInt(cb.dataset.id));
        if(selected.length === 0) return alert("Hech narsa tanlanmadi!");
        if(confirm(selected.length + " ta ma'lumot o'chirilsinmi?")) {
            data = data.filter(i => !selected.includes(i.id));
            updateUI();
        }
    }

    function clearAllData() {
        if(confirm("DIQQAT! Hamma ma'lumotlar o'chib ketadi. Rozimisiz?")) {
            data = []; updateUI();
        }
    }

    function exportToExcel() {
        if(data.length === 0) return;
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Hisobot");
        XLSX.writeFile(wb, "Hisobot.xlsx");
    }
</script>

</body>
</html>
